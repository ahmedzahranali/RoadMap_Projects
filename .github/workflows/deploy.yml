on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-roadmap-placeholder:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Deploy Placeholder to EC2 via Rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: /public/
          remote_path: /var/www/placeholder-site/
          remote_host: ${{ secrets.EC2_IP }}
          remote_user: ec2-user
          remote_key: ${{ secrets.EC2_SSH_KEY }}
